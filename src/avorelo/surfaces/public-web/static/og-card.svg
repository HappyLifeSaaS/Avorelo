<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Avorelo — AI Work Control for your coding agent">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FBFAF8"/>
      <stop offset="1" stop-color="#EFEBE4"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="0" y="0" width="1200" height="10" fill="#4B50E8"/>

  <circle cx="96" cy="104" r="14" fill="#17A87A"/>
  <text x="126" y="122" font-family="Segoe UI, Arial, sans-serif" font-size="58" font-weight="800" fill="#0A0E1C" letter-spacing="-1">Avorelo</text>
  <text x="82" y="182" font-family="Segoe UI, Arial, sans-serif" font-size="21" font-weight="700" letter-spacing="3" fill="#17A87A">AI WORK CONTROL FOR YOUR CODING AGENT</text>

  <text x="80" y="276" font-family="Segoe UI, Arial, sans-serif" font-size="52" font-weight="700" fill="#0A0E1C">Make every AI coding run</text>
  <text x="80" y="342" font-family="Segoe UI, Arial, sans-serif" font-size="52" font-weight="800" fill="#4B50E8">secure, lean, and provable.</text>

  <g font-family="Segoe UI, Arial, sans-serif">
    <g transform="translate(80,406)">
      <rect x="0" y="0" width="336" height="120" rx="16" fill="#FFFFFF" stroke="rgba(10,14,28,.10)"/>
      <text x="22" y="46" font-size="24" font-weight="800" fill="#0A0E1C">Secure</text>
      <text x="22" y="78" font-size="17" fill="#4A4E5E">Secrets never reach the</text>
      <text x="22" y="100" font-size="17" fill="#4A4E5E">model. Injection blocked.</text>
    </g>
    <g transform="translate(432,406)">
      <rect x="0" y="0" width="336" height="120" rx="16" fill="#FFFFFF" stroke="rgba(10,14,28,.10)"/>
      <text x="22" y="46" font-size="24" font-weight="800" fill="#0A0E1C">Lean</text>
      <text x="22" y="78" font-size="17" fill="#4A4E5E">Only the context each</text>
      <text x="22" y="100" font-size="17" fill="#4A4E5E">task needs. Fewer tokens.</text>
    </g>
    <g transform="translate(784,406)">
      <rect x="0" y="0" width="336" height="120" rx="16" fill="#FFFFFF" stroke="rgba(10,14,28,.10)"/>
      <text x="22" y="46" font-size="24" font-weight="800" fill="#0A0E1C">Provable</text>
      <text x="22" y="78" font-size="17" fill="#4A4E5E">Verifiable proof of</text>
      <text x="22" y="100" font-size="17" fill="#4A4E5E">exactly what changed.</text>
    </g>
  </g>

  <text x="80" y="590" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="600" fill="#7A7E8E">Open Source &#183; Apache-2.0 &#183; Runs locally &#183; npm install -g avorelo</text>
</svg>
