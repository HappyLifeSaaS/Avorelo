# Avorelo public website — static site deployment from HappyLifeSaaS/Avorelo (canonical repo).
# Publishes only the generated dist/site/ directory. No repo internals exposed.

[build]
  command = "npm run build:site"
  publish = "dist/site"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
